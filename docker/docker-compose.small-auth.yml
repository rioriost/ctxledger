services:
  traefik:
    image: traefik:v3.1
    container_name: ctxledger-traefik
    restart: unless-stopped
    depends_on:
      auth-small:
        condition: service_healthy
      ctxledger-private:
        condition: service_healthy
    command:
      - --entrypoints.web.address=:8091
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --api.dashboard=false
      - --ping=true
      - --accesslog=true
      - --log.level=INFO
    ports:
      - "8091:8091"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8091/ping >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth-small:
    image: python:3.14-slim
    container_name: ctxledger-auth-small
    restart: unless-stopped
    environment:
      AUTH_SMALL_BEARER_TOKEN: ${CTXLEDGER_SMALL_AUTH_TOKEN:-replace-me-with-a-strong-secret}
      AUTH_SMALL_USER: local-dev
      AUTH_SMALL_MODE: static-token
      PYTHONPATH: /app/src
    working_dir: /app
    command:
      [
        "sh",
        "-lc",
        "python -m pip install --upgrade pip && python -m pip install fastapi 'uvicorn[standard]' && uvicorn auth_small_app:app --app-dir /app/src --host 0.0.0.0 --port 8090",
      ]
    expose:
      - "8090"
    volumes:
      - ./auth_small/src:/app/src:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8090/healthz'', timeout=5).read()"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ctxledger:
    profiles:
      - disabled

  ctxledger-private:
    image: python:3.14-slim
    container_name: ctxledger-server-private
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CTXLEDGER_APP_NAME: ctxledger
      CTXLEDGER_APP_VERSION: 0.1.0
      CTXLEDGER_ENV: docker
      CTXLEDGER_DATABASE_URL: postgresql://ctxledger:ctxledger@postgres:5432/ctxledger
      CTXLEDGER_TRANSPORT: http
      CTXLEDGER_ENABLE_HTTP: "true"
      CTXLEDGER_HOST: 0.0.0.0
      CTXLEDGER_PORT: 8080
      CTXLEDGER_HTTP_PATH: /mcp
      CTXLEDGER_REQUIRE_AUTH: "false"
      CTXLEDGER_ENABLE_DEBUG_ENDPOINTS: "true"
      CTXLEDGER_PROJECTION_ENABLED: "true"
      CTXLEDGER_PROJECTION_DIRECTORY: .agent
      CTXLEDGER_PROJECTION_WRITE_JSON: "true"
      CTXLEDGER_PROJECTION_WRITE_MARKDOWN: "true"
      CTXLEDGER_LOG_LEVEL: info
      CTXLEDGER_LOG_STRUCTURED: "true"
      CTXLEDGER_DB_CONNECT_TIMEOUT_SECONDS: 5
      PYTHONPATH: /app/src
    working_dir: /app
    command:
      [
        "sh",
        "-lc",
        "python -m pip install --upgrade pip && python -m pip install -e . && uvicorn ctxledger.http_app:app --host 0.0.0.0 --port 8080",
      ]
    expose:
      - "8080"
    volumes:
      - ..:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8080/debug/runtime'', timeout=5).read()"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
