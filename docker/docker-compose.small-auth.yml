services:
  ctxledger-private-init:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ctxledger:local
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CTXLEDGER_APP_NAME: ctxledger
      CTXLEDGER_APP_VERSION: 1.2.0
      CTXLEDGER_ENV: docker
      CTXLEDGER_DATABASE_URL: postgresql://ctxledger:ctxledger@postgres:5432/ctxledger
      CTXLEDGER_TRANSPORT: http
      CTXLEDGER_ENABLE_HTTP: "true"
      CTXLEDGER_HOST: 0.0.0.0
      CTXLEDGER_PORT: 8080
      CTXLEDGER_HTTP_PATH: /mcp
      CTXLEDGER_ENABLE_DEBUG_ENDPOINTS: "true"
      CTXLEDGER_LOG_LEVEL: info
      CTXLEDGER_LOG_STRUCTURED: "true"
      CTXLEDGER_DB_CONNECT_TIMEOUT_SECONDS: 5
      CTXLEDGER_DB_AGE_ENABLED: "true"
      CTXLEDGER_DB_AGE_GRAPH_NAME: ctxledger_memory
      CTXLEDGER_PRIVATE_INIT_REBUILD_AGE_GRAPH: ${CTXLEDGER_PRIVATE_INIT_REBUILD_AGE_GRAPH:-false}
      CTXLEDGER_PRIVATE_INIT_BOOTSTRAP_AGE_GRAPH: ${CTXLEDGER_PRIVATE_INIT_BOOTSTRAP_AGE_GRAPH:-false}
      CTXLEDGER_EMBEDDING_ENABLED: "true"
      CTXLEDGER_EMBEDDING_PROVIDER: ${CTXLEDGER_EMBEDDING_PROVIDER:-local_stub}
      CTXLEDGER_EMBEDDING_MODEL: ${OPENAI_MODEL:-text-embedding-3-small}
      CTXLEDGER_EMBEDDING_DIMENSIONS: ${CTXLEDGER_EMBEDDING_DIMENSIONS:-1536}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CTXLEDGER_GRAFANA_POSTGRES_HOST: ${CTXLEDGER_GRAFANA_POSTGRES_HOST:-postgres:5432}
      CTXLEDGER_GRAFANA_POSTGRES_DB: ${CTXLEDGER_GRAFANA_POSTGRES_DB:-ctxledger}
      CTXLEDGER_GRAFANA_POSTGRES_USER: ${CTXLEDGER_GRAFANA_POSTGRES_USER:-ctxledger_grafana}
      CTXLEDGER_GRAFANA_POSTGRES_PASSWORD: ${CTXLEDGER_GRAFANA_POSTGRES_PASSWORD}
      CTXLEDGER_GRAFANA_POSTGRES_SSLMODE: ${CTXLEDGER_GRAFANA_POSTGRES_SSLMODE:-disable}
      PYTHONPATH: /app/src
      PATH: /root/.local/bin:/opt/ctxledger-venv/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
    working_dir: /app
    command: ["scripts/private_init_entrypoint.sh"]

  traefik:
    image: docker.io/library/traefik:v3.1
    restart: unless-stopped
    depends_on:
      auth-small:
        condition: service_healthy
      ctxledger-private:
        condition: service_healthy
      grafana:
        condition: service_healthy
    command:
      - --entrypoints.websecure.address=:8443
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --api.dashboard=false
      - --ping=true
      - --accesslog=true
      - --log.level=INFO
    ports:
      - "${CTXLEDGER_BIND_HOST:-}:8443:8443"
    volumes:
      # `:Z` is a private SELinux relabel that lets rootless Podman on
      # SELinux-enforcing hosts (Fedora, RHEL, CentOS Stream) read these
      # files and, critically, lets the Traefik file provider attach an
      # inotify watcher to /etc/traefik/dynamic.yml. Without it, Traefik
      # logs `Cannot start the provider *file.Provider error="error
      # adding file watcher: permission denied"` and serves 404 for
      # every route. Docker Desktop on macOS / Windows ignores `:Z` and
      # treats both entries as ordinary read-only bind mounts.
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro,Z
      - ./traefik/certs:/etc/traefik/certs:ro,Z
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth-small:
    build:
      context: ..
      dockerfile: docker/auth_small/Dockerfile
    image: ctxledger-auth-small:local
    restart: unless-stopped
    environment:
      AUTH_SMALL_BEARER_TOKEN: ${CTXLEDGER_SMALL_AUTH_TOKEN:-replace-me-with-a-strong-secret}
      AUTH_SMALL_USER: local-dev
      AUTH_SMALL_MODE: static-token
    expose:
      - "8090"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8090/healthz > /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  grafana:
    image: docker.io/grafana/grafana:11.1.7
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ctxledger-private-init:
        condition: service_completed_successfully
    environment:
      GF_SECURITY_ADMIN_USER: ${CTXLEDGER_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${CTXLEDGER_GRAFANA_ADMIN_PASSWORD:-ctxledger-grafana-change-me}
      # NOTE: kept as a single-level ${VAR:-default} for compatibility with
      # podman-compose 1.5.x, which does not support nested variable
      # substitution (containers/podman-compose#1064). To deploy on a
      # non-localhost host, set CTXLEDGER_GRAFANA_DOMAIN and
      # CTXLEDGER_GRAFANA_ROOT_URL directly in your env file.
      # CTXLEDGER_PUBLIC_HOST remains a documented convention for env files
      # but is not interpolated here.
      GF_SERVER_DOMAIN: ${CTXLEDGER_GRAFANA_DOMAIN:-localhost}
      GF_SERVER_ROOT_URL: ${CTXLEDGER_GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_LOG_MODE: console
      GF_LOG_LEVEL: info
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_PATHS_CONFIG: /etc/grafana/grafana.ini
      CTXLEDGER_GRAFANA_POSTGRES_HOST: ${CTXLEDGER_GRAFANA_POSTGRES_HOST:-postgres:5432}
      CTXLEDGER_GRAFANA_POSTGRES_DB: ${CTXLEDGER_GRAFANA_POSTGRES_DB:-ctxledger}
      CTXLEDGER_GRAFANA_POSTGRES_USER: ${CTXLEDGER_GRAFANA_POSTGRES_USER:-ctxledger_grafana}
      CTXLEDGER_GRAFANA_POSTGRES_PASSWORD: ${CTXLEDGER_GRAFANA_POSTGRES_PASSWORD:-replace-with-a-strong-secret}
      CTXLEDGER_GRAFANA_POSTGRES_SSLMODE: ${CTXLEDGER_GRAFANA_POSTGRES_SSLMODE:-disable}
      CTXLEDGER_DATABASE_URL: ${CTXLEDGER_DATABASE_URL:-postgresql://ctxledger:ctxledger@postgres:5432/ctxledger}
    ports:
      - "${CTXLEDGER_BIND_HOST:-}:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ctxledger:
    profiles:
      - disabled

  ctxledger-private:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ctxledger:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CTXLEDGER_APP_NAME: ctxledger
      CTXLEDGER_APP_VERSION: 1.2.0
      CTXLEDGER_ENV: docker
      CTXLEDGER_DATABASE_URL: postgresql://ctxledger:ctxledger@postgres:5432/ctxledger
      CTXLEDGER_TRANSPORT: http
      CTXLEDGER_ENABLE_HTTP: "true"
      CTXLEDGER_HOST: 0.0.0.0
      CTXLEDGER_PORT: 8080
      CTXLEDGER_HTTP_PATH: /mcp
      CTXLEDGER_ENABLE_DEBUG_ENDPOINTS: "true"
      CTXLEDGER_LOG_LEVEL: info
      CTXLEDGER_LOG_STRUCTURED: "true"
      CTXLEDGER_DB_CONNECT_TIMEOUT_SECONDS: 5
      CTXLEDGER_DB_AGE_ENABLED: "true"
      CTXLEDGER_DB_AGE_GRAPH_NAME: ctxledger_memory
      CTXLEDGER_EMBEDDING_ENABLED: "true"
      CTXLEDGER_EMBEDDING_PROVIDER: ${CTXLEDGER_EMBEDDING_PROVIDER:-local_stub}
      CTXLEDGER_EMBEDDING_MODEL: ${OPENAI_MODEL:-text-embedding-3-small}
      CTXLEDGER_EMBEDDING_DIMENSIONS: ${CTXLEDGER_EMBEDDING_DIMENSIONS:-1536}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CTXLEDGER_GRAFANA_POSTGRES_HOST: ${CTXLEDGER_GRAFANA_POSTGRES_HOST:-postgres:5432}
      CTXLEDGER_GRAFANA_POSTGRES_DB: ${CTXLEDGER_GRAFANA_POSTGRES_DB:-ctxledger}
      CTXLEDGER_GRAFANA_POSTGRES_USER: ${CTXLEDGER_GRAFANA_POSTGRES_USER:-ctxledger_grafana}
      CTXLEDGER_GRAFANA_POSTGRES_PASSWORD: ${CTXLEDGER_GRAFANA_POSTGRES_PASSWORD}
      CTXLEDGER_GRAFANA_POSTGRES_SSLMODE: ${CTXLEDGER_GRAFANA_POSTGRES_SSLMODE:-disable}
      PYTHONPATH: /app/src
      PATH: /root/.local/bin:/opt/ctxledger-venv/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
    working_dir: /app
    command:
      [
        "/opt/ctxledger-venv/bin/python",
        "-m",
        "uvicorn",
        "ctxledger.http_app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8080/debug/runtime > /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  grafana_data:
