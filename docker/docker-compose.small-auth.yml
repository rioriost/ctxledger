services:
  traefik:
    image: traefik:v3.1
    container_name: ctxledger-traefik
    restart: unless-stopped
    depends_on:
      auth-small:
        condition: service_healthy
      ctxledger-private:
        condition: service_healthy
      grafana:
        condition: service_healthy
    command:
      - --entrypoints.websecure.address=:8443
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --api.dashboard=false
      - --ping=true
      - --accesslog=true
      - --log.level=INFO
    ports:
      - "8443:8443"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[t]raefik' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth-small:
    image: python:3.14-slim
    container_name: ctxledger-auth-small
    restart: unless-stopped
    environment:
      AUTH_SMALL_BEARER_TOKEN: ${CTXLEDGER_SMALL_AUTH_TOKEN:-replace-me-with-a-strong-secret}
      AUTH_SMALL_USER: local-dev
      AUTH_SMALL_MODE: static-token
      PYTHONPATH: /app/src
    working_dir: /app
    command:
      [
        "sh",
        "-lc",
        "python -m pip install --upgrade pip && python -m pip install fastapi 'uvicorn[standard]' && uvicorn auth_small_app:app --app-dir /app/src --host 0.0.0.0 --port 8090",
      ]
    expose:
      - "8090"
    volumes:
      - ./auth_small/src:/app/src:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8090/healthz'', timeout=5).read()"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  grafana:
    image: grafana/grafana:11.1.4
    container_name: ctxledger-grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${CTXLEDGER_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${CTXLEDGER_GRAFANA_ADMIN_PASSWORD:-ctxledger-grafana-change-me}
      GF_SERVER_DOMAIN: ${CTXLEDGER_GRAFANA_DOMAIN:-localhost}
      GF_SERVER_ROOT_URL: ${CTXLEDGER_GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_LOG_MODE: console
      GF_LOG_LEVEL: info
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_PATHS_CONFIG: /etc/grafana/grafana.ini
      CTXLEDGER_GRAFANA_POSTGRES_HOST: ${CTXLEDGER_GRAFANA_POSTGRES_HOST:-postgres:5432}
      CTXLEDGER_GRAFANA_POSTGRES_DB: ${CTXLEDGER_GRAFANA_POSTGRES_DB:-ctxledger}
      CTXLEDGER_GRAFANA_POSTGRES_USER: ${CTXLEDGER_GRAFANA_POSTGRES_USER:-ctxledger_grafana}
      CTXLEDGER_GRAFANA_POSTGRES_PASSWORD: ${CTXLEDGER_GRAFANA_POSTGRES_PASSWORD:-replace-with-a-strong-secret}
      CTXLEDGER_GRAFANA_POSTGRES_SSLMODE: ${CTXLEDGER_GRAFANA_POSTGRES_SSLMODE:-disable}
      CTXLEDGER_DATABASE_URL: ${CTXLEDGER_DATABASE_URL:-postgresql://ctxledger:ctxledger@postgres:5432/ctxledger}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ctxledger:
    profiles:
      - disabled

  ctxledger-private:
    image: python:3.14-slim
    container_name: ctxledger-server-private
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CTXLEDGER_APP_NAME: ctxledger
      CTXLEDGER_APP_VERSION: 0.4.0
      CTXLEDGER_ENV: docker
      CTXLEDGER_DATABASE_URL: postgresql://ctxledger:ctxledger@postgres:5432/ctxledger
      CTXLEDGER_TRANSPORT: http
      CTXLEDGER_ENABLE_HTTP: "true"
      CTXLEDGER_HOST: 0.0.0.0
      CTXLEDGER_PORT: 8080
      CTXLEDGER_HTTP_PATH: /mcp
      CTXLEDGER_ENABLE_DEBUG_ENDPOINTS: "true"
      CTXLEDGER_LOG_LEVEL: info
      CTXLEDGER_LOG_STRUCTURED: "true"
      CTXLEDGER_DB_CONNECT_TIMEOUT_SECONDS: 5
      CTXLEDGER_DB_AGE_ENABLED: "true"
      CTXLEDGER_DB_AGE_GRAPH_NAME: ctxledger_memory
      CTXLEDGER_EMBEDDING_ENABLED: "true"
      CTXLEDGER_EMBEDDING_PROVIDER: ${CTXLEDGER_EMBEDDING_PROVIDER:-local_stub}
      CTXLEDGER_EMBEDDING_MODEL: ${OPENAI_MODEL:-text-embedding-3-small}
      CTXLEDGER_EMBEDDING_DIMENSIONS: ${CTXLEDGER_EMBEDDING_DIMENSIONS:-16}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CTXLEDGER_GRAFANA_POSTGRES_HOST: ${CTXLEDGER_GRAFANA_POSTGRES_HOST:-postgres:5432}
      CTXLEDGER_GRAFANA_POSTGRES_DB: ${CTXLEDGER_GRAFANA_POSTGRES_DB:-ctxledger}
      CTXLEDGER_GRAFANA_POSTGRES_USER: ${CTXLEDGER_GRAFANA_POSTGRES_USER:-ctxledger_grafana}
      CTXLEDGER_GRAFANA_POSTGRES_PASSWORD: ${CTXLEDGER_GRAFANA_POSTGRES_PASSWORD}
      CTXLEDGER_GRAFANA_POSTGRES_SSLMODE: ${CTXLEDGER_GRAFANA_POSTGRES_SSLMODE:-disable}
      PYTHONPATH: /app/src
    working_dir: /app
    command:
      [
        "sh",
        "-lc",
        "python -m pip install --upgrade pip && python -m pip install -e . && python -m ctxledger.__init__ apply-schema && python scripts/ensure_age_extension.py --database-url postgresql://ctxledger:ctxledger@postgres:5432/ctxledger && python -m ctxledger.__init__ bootstrap-age-graph --database-url postgresql://ctxledger:ctxledger@postgres:5432/ctxledger --graph-name ctxledger_memory && python scripts/setup_grafana_observability.py && uvicorn ctxledger.http_app:app --host 0.0.0.0 --port 8080",
      ]
    expose:
      - "8080"
    volumes:
      - ..:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8080/debug/runtime'', timeout=5).read()"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  grafana_data:
