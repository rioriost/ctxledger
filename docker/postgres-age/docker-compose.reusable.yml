services:
  postgres:
    image: ctxledger-postgres-age:pg17
    build:
      context: ../..
      dockerfile: docker/postgres-age/Dockerfile
      args:
        POSTGRES_BASE_IMAGE: ${POSTGRES_BASE_IMAGE:-postgres:17}
        POSTGRES_MAJOR: ${POSTGRES_MAJOR:-17}
        APACHE_AGE_REF: ${APACHE_AGE_REF:-PG17/v1.7.0-rc0}
        PGVECTOR_REF: ${PGVECTOR_REF:-v0.8.2}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  postgres_data:
