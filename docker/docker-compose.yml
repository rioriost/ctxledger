name: ctxledger

services:
  postgres:
    image: ctxledger-postgres-age:pg17
    build:
      context: ..
      dockerfile: docker/postgres-age/Dockerfile
      args:
        POSTGRES_BASE_IMAGE: postgres:17
        POSTGRES_MAJOR: 17
        APACHE_AGE_REF: PG17/v1.7.0-rc0
        PGVECTOR_REF: v0.8.2
    container_name: ctxledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ctxledger
      POSTGRES_USER: ctxledger
      POSTGRES_PASSWORD: ctxledger
      PGDATA: /var/lib/postgresql/data
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctxledger -d ctxledger"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  ctxledger:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ctxledger:local
    container_name: ctxledger-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CTXLEDGER_APP_NAME: ctxledger
      CTXLEDGER_APP_VERSION: 1.1.1
      CTXLEDGER_ENV: docker
      CTXLEDGER_DATABASE_URL: postgresql://ctxledger:ctxledger@postgres:5432/ctxledger
      CTXLEDGER_TRANSPORT: http
      CTXLEDGER_ENABLE_HTTP: "true"
      CTXLEDGER_HOST: 0.0.0.0
      CTXLEDGER_PORT: 8080
      CTXLEDGER_HTTP_PATH: /mcp
      # Debug endpoints are enabled by default for local operator visibility.
      # Disable them in production unless there is a clear operational need.
      CTXLEDGER_ENABLE_DEBUG_ENDPOINTS: "true"
      CTXLEDGER_LOG_LEVEL: info
      CTXLEDGER_LOG_STRUCTURED: "true"
      CTXLEDGER_DB_CONNECT_TIMEOUT_SECONDS: 5
      CTXLEDGER_DB_AGE_ENABLED: "true"
      CTXLEDGER_DB_AGE_GRAPH_NAME: ctxledger_memory
      PYTHONPATH: /app/src
      PATH: /root/.local/bin:/opt/ctxledger-venv/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
    working_dir: /app
    command:
      [
        "/opt/ctxledger-venv/bin/python",
        "-m",
        "uvicorn",
        "ctxledger.http_app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    expose:
      - "8080"
    volumes:
      - ..:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8080/debug/runtime'', timeout=5).read()"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
