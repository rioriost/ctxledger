http:
  routers:
    ctxledger-mcp-https:
      entryPoints:
        - websecure
      rule: "PathPrefix(`/mcp`) || PathPrefix(`/debug/`) || PathPrefix(`/workflow-resume/`) || Path(`/projection_failures_ignore`) || Path(`/projection_failures_resolve`)"
      service: ctxledger-backend
      middlewares:
        - ctxledger-forward-auth
      tls: {}

  middlewares:
    ctxledger-forward-auth:
      forwardAuth:
        address: http://auth-small:8090/auth/verify
        trustForwardHeader: true
        authResponseHeaders:
          - X-Auth-User
          - X-Auth-Mode

  services:
    ctxledger-backend:
      loadBalancer:
        servers:
          - url: http://ctxledger-private:8080

tls:
  certificates:
    - certFile: /etc/traefik/certs/localhost.crt
      keyFile: /etc/traefik/certs/localhost.key
