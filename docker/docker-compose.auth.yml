services:
  ctxledger:
    environment:
      CTXLEDGER_REQUIRE_AUTH: "true"
      CTXLEDGER_AUTH_BEARER_TOKEN: smoke-test-secret-token
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8080/debug/runtime?authorization=Bearer%20smoke-test-secret-token'', timeout=5).read()"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
