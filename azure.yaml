name: ctxledger
metadata:
  template: ctxledger-large-azure@1.0.0
  description: One-command Azure large deployment for ctxledger using Azure Developer CLI
infra:
  provider: bicep
  path: infra

services:
  ctxledger:
    project: .
    host: containerapp
    language: py
    docker:
      path: ./Dockerfile
      context: .
      registry: ${CONTAINER_REGISTRY_LOGIN_SERVER}
      image: ctxledger/ctxledger-ctxledger:latest
      remoteBuild: true

hooks:
  postprovision:
    posix:
      shell: sh
      run: |
        set -eu

        azd env refresh

        if [ -z "${CTXLEDGER_DATABASE_URL:-}" ]; then
          echo "CTXLEDGER_DATABASE_URL is not set after provisioning." >&2
          exit 1
        fi

        if [ -z "${AZURE_CONTAINER_REGISTRY_ENDPOINT:-}" ]; then
          echo "AZURE_CONTAINER_REGISTRY_ENDPOINT is not set after provisioning." >&2
          exit 1
        fi

        if [ -z "${AZURE_OPENAI_ENDPOINT:-}" ]; then
          echo "AZURE_OPENAI_ENDPOINT is not set after provisioning." >&2
          exit 1
        fi

        if [ -z "${AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME:-}" ]; then
          echo "AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME is not set after provisioning." >&2
          exit 1
        fi

        if [ -z "${AZURE_OPENAI_EFFECTIVE_AUTH_MODE:-}" ]; then
          echo "AZURE_OPENAI_EFFECTIVE_AUTH_MODE is not set after provisioning." >&2
          exit 1
        fi

        echo "Skipping local PostgreSQL bootstrap during postprovision."
        echo "Bootstrap must run from Azure-side execution to avoid local firewall and network dependencies."
        echo "Next step after image deployment: run scripts/run_azure_bootstrap.sh inside an Azure-hosted execution context that can reach PostgreSQL Flexible Server."
      interactive: false

  postdeploy:
    posix:
      shell: sh
      run: |
        set -eu

        azd env refresh

        if [ -z "${AZURE_RESOURCE_GROUP:-}" ]; then
          echo "AZURE_RESOURCE_GROUP is not set after deployment." >&2
          exit 1
        fi

        if [ -z "${CONTAINER_APP_NAME:-}" ]; then
          echo "CONTAINER_APP_NAME is not set after deployment." >&2
          exit 1
        fi

        MCP_ENDPOINT_FQDN="$(az containerapp show --name "${CONTAINER_APP_NAME}" --resource-group "${AZURE_RESOURCE_GROUP}" --query "properties.configuration.ingress.fqdn" -o tsv)"
        if [ -z "${MCP_ENDPOINT_FQDN}" ]; then
          echo "Container App ingress FQDN could not be resolved after deployment." >&2
          exit 1
        fi

        export MCP_ENDPOINT_URL="https://${MCP_ENDPOINT_FQDN}/mcp"

        MCP_AUTH_MODE_VALUE="${MCP_AUTH_MODE:-none}"
        MCP_AUTH_HEADER_NAME_VALUE="${MCP_AUTH_HEADER_NAME:-Authorization}"
        AZURE_ENV_TYPE_VALUE="${AZURE_ENV_TYPE:-unknown}"
        export CTXLEDGER_POSTDEPLOY_SMOKE_STATUS="passed"
        export CTXLEDGER_POSTDEPLOY_SMOKE_PROBE_MODE="http"
        export CTXLEDGER_POSTDEPLOY_SMOKE_PROTOCOL_VERSION="${CTXLEDGER_SMOKE_PROTOCOL_VERSION:-2024-11-05}"
        export CTXLEDGER_POSTDEPLOY_SMOKE_FOLLOW_UP_PROBES="none"
        export CTXLEDGER_DEPLOYMENT_TIMESTAMP="2026-03-30T05:08:22.675877+00:00"
        export CTXLEDGER_APP_VERSION="${CTXLEDGER_APP_VERSION:-unknown}"
        export CTXLEDGER_SMOKE_TIMEOUT_SECONDS="${CTXLEDGER_SMOKE_TIMEOUT_SECONDS:-60}"
        POSTDEPLOY_INITIAL_WAIT_SECONDS="${CTXLEDGER_POSTDEPLOY_INITIAL_WAIT_SECONDS:-15}"

        echo "Container App revision status before smoke:"
        az containerapp revision list --name "${CONTAINER_APP_NAME}" --resource-group "${AZURE_RESOURCE_GROUP}" --output table || true

        echo "Container App system logs before smoke:"
        az containerapp logs show --name "${CONTAINER_APP_NAME}" --resource-group "${AZURE_RESOURCE_GROUP}" --type system --follow false --tail 100 || true

        echo "Waiting ${POSTDEPLOY_INITIAL_WAIT_SECONDS}s before smoke probe to allow ingress and revision readiness to settle."
        sleep "${POSTDEPLOY_INITIAL_WAIT_SECONDS}"

        SMOKE_OUTPUT="$(python3 scripts/postdeploy_smoke.py --endpoint-url "${MCP_ENDPOINT_URL}" --probe-mode http --timeout-seconds "${CTXLEDGER_SMOKE_TIMEOUT_SECONDS}")"
        printf '%s\n' "${SMOKE_OUTPUT}"
        SMOKE_BODY_PREVIEW="$(printf '%s\n' "${SMOKE_OUTPUT}" | sed -n 's/^body_preview: //p' | head -n 1)"
        export CTXLEDGER_POSTDEPLOY_SMOKE_BODY_PREVIEW="${SMOKE_BODY_PREVIEW}"

        python3 scripts/write_mcp_client_snippets.py --endpoint-url "${MCP_ENDPOINT_URL}" --auth-mode "${MCP_AUTH_MODE_VALUE}" --auth-header-name "${MCP_AUTH_HEADER_NAME_VALUE}"
        python3 scripts/write_mcp_snippets_readme.py --endpoint-url "${MCP_ENDPOINT_URL}" --auth-mode "${MCP_AUTH_MODE_VALUE}" --auth-header-name "${MCP_AUTH_HEADER_NAME_VALUE}"

        echo
        echo "ctxledger Azure large deployment completed."
        echo
        echo "Next step: configure your AI agent / MCP client."
        echo "MCP endpoint: ${MCP_ENDPOINT_URL}"
        echo "Deployed image: ${CONTAINER_IMAGE_REFERENCE:-unknown}"
        echo "Snippet README: .azure/mcp-snippets/README.md"
        echo "Snippet directory: .azure/mcp-snippets"
        echo "Summary metadata: .azure/mcp-snippets/summary.json"
        echo
        echo "Release-evidence metadata:"
        echo "- Deployment timestamp: ${CTXLEDGER_DEPLOYMENT_TIMESTAMP}"
        echo "- Application version: ${CTXLEDGER_APP_VERSION}"
        echo "- Smoke status: ${CTXLEDGER_POSTDEPLOY_SMOKE_STATUS}"
        echo "- Smoke probe mode: ${CTXLEDGER_POSTDEPLOY_SMOKE_PROBE_MODE}"
        echo "- Smoke follow-up probes: ${CTXLEDGER_POSTDEPLOY_SMOKE_FOLLOW_UP_PROBES}"
        echo
        echo "Deployment context:"
        echo "- Azure environment type: ${AZURE_ENV_TYPE_VALUE}"
        echo "- MCP auth mode: ${MCP_AUTH_MODE_VALUE}"
        echo "- MCP auth header: ${MCP_AUTH_HEADER_NAME_VALUE}"
        echo
        echo "Open the generated README first, then copy the snippet for your client."
      interactive: true
